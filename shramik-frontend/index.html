<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- SEO Meta Tags -->
    <title>Shramik Profile — Hyperlocal On-Demand Skill Marketplace</title>
    <meta name="description" content="Connect instantly with verified local electricians, plumbers, carpenters, and painters near you. Shramik Profile — Your hyperlocal skill marketplace powered by real-time pricing and geospatial discovery." />
    <meta name="keywords" content="hyperlocal marketplace, local technicians, plumber, electrician, carpenter, on-demand services, India" />
    <meta name="author" content="Shramik Profile" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shramik Profile — Hyperlocal Skill Marketplace" />
    <meta property="og:description" content="Find verified, local service professionals in minutes. Real-time geospatial discovery, transparent pricing, and instant chat." />
    <meta property="og:image" content="/og-preview.png" />
    <meta property="og:url" content="https://shramik.app" />
    <meta property="og:site_name" content="Shramik Profile" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shramik Profile — Hyperlocal Skill Marketplace" />
    <meta name="twitter:description" content="Instantly connect with verified local service technicians. On-demand, transparent, hyperlocal." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shramik" />

    <!-- Google Fonts Preconnect (performance optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
