# ==============================================================
# SHRAMIK PROFILE — Spring Boot Application Configuration
# ==============================================================

# --------------------------------------------------------------
# Server
# --------------------------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# --------------------------------------------------------------
# Application Name
# --------------------------------------------------------------
spring.application.name=shramik-profile-backend

# --------------------------------------------------------------
# MongoDB Configuration
# Ensure MongoDB is running on localhost:27017 before starting.
# The 'shramik' database is auto-created on first document insert.
# Required: MongoDB 4.4+ for $geoNear aggregation & TTL index support
# auto-index-creation=true is critical — it triggers creation of:
#   - @GeoSpatialIndexed (2dsphere) on User.location, Technician.location
#   - @Indexed(expireAfterSeconds=300) TTL on OtpToken.createdAt
# --------------------------------------------------------------
spring.data.mongodb.uri=mongodb://localhost:27017/shramik
spring.data.mongodb.auto-index-creation=true

